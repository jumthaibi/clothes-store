<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script src="https://code.jquery.com/jquery-3.2.1.slim.min.js" integrity="sha384-KJ3o2DKtIkvYIK3UENzmM7KCkRr/rE9/Qpg6aAZGJwFDMVNA/GpGFF93hXpG5KkN" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/popper.js@1.12.9/dist/umd/popper.min.js" integrity="sha384-ApNbgh9B+Y1QKtv3Rn7W3mgPxhU9K/ScQsAP7hUibX39j7fakFPskvXusvfa0b4Q" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.0.0/dist/js/bootstrap.min.js" integrity="sha384-JZR6Spejh4U02d8jOt6vLEHfe/JQGiRRSQQxSfFWpi1MquVdAyjUar5+76PVCmYl" crossorigin="anonymous"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.0.0/dist/css/bootstrap.min.css" integrity="sha384-Gn5384xqQ1aoWXA+058RXPxPg6fy4IWvTNh0E263XmFcJlSAwiGgFAW/dAiS6JXm" crossorigin="anonymous">
</head>
<body>
    <p>elements added <span id="numID">0</span></p>
    <div>
        <form action="">
            <label for="">size</label>
            <select name="size" id="size-el1" required>
                <option value="">None</option>
                <option value="small">small</option>
                <option value="medium">medium</option>
                <option value="large">large</option>
            </select>
            <br>
            <input type="button" value="add to basket" onclick="add_to_basket('element1','size-el1')">
        </form>
        
    </div>

    <div>
        <form action="">
            <label for="">size</label>
            <select name="size" id="size-el2" required>
                <option value="">None</option>
                <option value="small">small</option>
                <option value="medium">medium</option>
                <option value="large">large</option>
            </select>
            <br>
            <input type="button" value="add to basket" onclick="add_to_basket('element2','size-el2')">
        </form>
        
    </div>

    <div>
        <form action="">
            <label for="">size</label>
            <select name="size" id="size-el3" required>
                <option value="">None</option>
                <option value="small">small</option>
                <option value="medium">medium</option>
                <option value="large">large</option>
            </select>
            <br>
            <input type="button" value="add to basket" onclick="add_to_basket('element3','size-el3')">
        </form>
        
    </div>

    <div id = "basketPage" >

    </div>

    <script>
        
        let basket = [];
        let counts = {};
        let basketPage = document.getElementById("basketPage");
        var elements_added = 0;
        var num_elements = document.getElementById("numID");


    function add_to_basket(element,sizeID,numID){
        
        var size = document.getElementById(sizeID).value;
        if(size === ""){
            alert("Please select a size first.");
            return;
        }

        basket.push({element: element, size: size});

        
        elements_added = elements_added + 1;
        num_elements.innerHTML = elements_added;


        let element_info = element + "-" + size;
        if(counts[element_info]){
            counts[element_info] += 1;
        } else {
            counts[element_info] = 1;
        }

        basketPage.innerHTML = "";
        for(let key in counts){
            basketPage.innerHTML += `<p>${key} is added ${counts[key]} times</p>`;
        }
    }//function end
    </script>
</body>
</html>
